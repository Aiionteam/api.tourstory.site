# feature/yujin 브랜치에 push 시 빌드 후 EC2 배포
#
# 필수 GitHub Secrets (Settings → Secrets and variables → Actions):
#   EC2_HOST      - EC2 퍼블릭 IP 또는 도메인
#   EC2_USER      - SSH 사용자 (Ubuntu: ubuntu)
#   EC2_SSH_KEY   - PEM 키 파일 내용 전체
#
# 선택: .env를 EC2로 복사하려면
#   Variables에 USE_ENV_FILE = true 추가
#   Secrets에 ENV_FILE = .env 파일 내용 전체 (그대로 붙여넣기)
#     또는 값에 따옴표 등 특수문자가 많으면 Base64 인코딩 후 넣고 USE_BASE64_ENV = true
#
name: Build and Deploy to EC2

on:
  push:
    branches:
      - feature/yujin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew :gateway:bootJar --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: gateway/build/libs/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: gateway-jar

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Ensure app directory on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'mkdir -p ~/app'

      - name: Copy JAR to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no *.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/gateway.jar

      - name: Copy .env to EC2
        if: vars.USE_ENV_FILE == 'true'
        run: |
          if [ "${{ vars.USE_BASE64_ENV }}" = "true" ]; then
            echo "${{ secrets.ENV_FILE }}" | base64 -d > .env
          else
            echo "${{ secrets.ENV_FILE }}" > .env
          fi
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no .env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/.env

      - name: Create restart script
        run: |
          cat > restart.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          cd ~/app
          if [ -f .env ]; then set -a; . ./.env || true; set +a; fi
          [ -n "$NEON_CONNECTION_STRING" ] && export SPRING_DATASOURCE_URL="$NEON_CONNECTION_STRING"
          [ -n "$NEON_USER" ] && export SPRING_DATASOURCE_USERNAME="$NEON_USER"
          [ -n "$NEON_PASSWORD" ] && export SPRING_DATASOURCE_PASSWORD="$NEON_PASSWORD"
          pkill -f gateway.jar || true
          sleep 2
          touch app.log
          nohup /usr/bin/java \
            ${SPRING_DATASOURCE_URL:+-Dspring.datasource.url="$SPRING_DATASOURCE_URL"} \
            ${SPRING_DATASOURCE_USERNAME:+-Dspring.datasource.username="$SPRING_DATASOURCE_USERNAME"} \
            ${SPRING_DATASOURCE_PASSWORD:+-Dspring.datasource.password="$SPRING_DATASOURCE_PASSWORD"} \
            -jar gateway.jar --spring.profiles.active=prod >> app.log 2>&1 &
          sleep 15
          pgrep -f gateway.jar || exit 1
          SCRIPT

      - name: Copy and run restart script on EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no restart.sh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/restart.sh
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'chmod +x ~/app/restart.sh && bash ~/app/restart.sh'

      - name: Show app.log on failure (디버깅용)
        if: failure()
        run: |
          echo "=== EC2 ~/app/app.log (last 80 lines) ==="
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'tail -80 ~/app/app.log 2>/dev/null || echo "(app.log 없음)"'
